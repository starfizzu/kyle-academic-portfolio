<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Basics Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="logo">CSS Lab</span>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <main>

    <section class="box-model-section">
      <h2>Box Model Demo</h2>
      <div class="box-container">
        <div class="box">Box 1</div>
        <div class="box box-alt">Box 2</div>
        <div class="box box-large">Box 3</div>
      </div>
    </section>

    <section class="flex-section">
      <h2>Flexbox Layout</h2>
      <div class="flex-container">
        <div class="flex-card">Card A</div>
        <div class="flex-card">Card B</div>
        <div class="flex-card">Card C</div>
        <div class="flex-card">Card D</div>
      </div>
    </section>

    <section class="form-section">
      <h2>Styled Form</h2>
      <div class="form-wrapper">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="4" placeholder="Write your message..."></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-primary">Submit</button>
          <button class="btn-secondary">Reset</button>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <div class="footer-inner">
      <p>CSS Basics Lab &mdash; All rights reserved &copy; 2025</p>
    </div>
  </footer>

</body>
</html>
